<!DOCTYPE html>

<html lang="en">
<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | EliteHomes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/register.css') }}">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


</head>

<body>

<section class="register-page">

<div class="container-fluid p-0">

<div class="row g-0 vh-100">

<!-- LEFT -->

<div class="col-lg-6 form-side">

<div class="register-card">

<h2>Create Account</h2>

<p>Join EliteHomes today</p>

<form method="POST" action="/register">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Full Name"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div class="mb-4">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
placeholder="Confirm Password">

</div>

<button
type="submit"
class="btn register-btn w-100">

<i class="bi bi-person-plus-fill"></i>

Create Account

</button>

</form>

<div class="login-link">

Already have an account?

<a href="/login">
Login
</a>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-6 image-side">

<div class="overlay-content">

<h1>EliteHomes</h1>

<h2>Luxury Living Starts Here</h2>

<p>
Discover premium properties and
AI-powered rent prediction.
</p>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
