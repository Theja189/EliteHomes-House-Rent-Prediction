<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Book Property</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h1 class="mb-4">

Book Property

</h1>

<div class="card p-4">

<h3>

{{ property.title }}

</h3>

<p>

City:
{{ property.city }}

</p>

<p>

Rent:
₹{{ property.rent }}

</p>

<form method="POST">

<div class="mb-3">

<label>

Customer Name

</label>

<input
type="text"
name="customer_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Contact Number

</label>

<input
type="text"
name="contact"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-primary">

Confirm Booking

</button>

</form>

</div>

</div>

</body>
</html>
