<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews | EliteHomes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#f5f7fb;
}

.review-container{
    max-width:900px;
    margin:50px auto;
}

.review-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.review-item{
    background:#f7f7ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.rating{
    color:#6c63ff;
    font-weight:bold;
}

.btn-review{
    background:linear-gradient(90deg,#4f46e5,#8b5cf6);
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container review-container">

<div class="review-card">

<h1 class="mb-4">
⭐ Property Reviews
</h1>

<form method="POST">

<div class="mb-3">

<label>Your Name</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Comment</label>

<textarea
name="comment"
class="form-control"
rows="4"
required></textarea>

</div>

<div class="mb-3">

<label>Rating (1-5)</label>

<input
type="number"
name="rating"
min="1"
max="5"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-review">

Submit Review

</button>

</form>

<hr class="my-4">

<h3>All Reviews</h3>

{% for review in reviews %}

<div class="review-item">

<h5>{{ review.username }}</h5>

<p>{{ review.comment }}</p>

<div class="rating">
⭐ {{ review.rating }}/5
</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
