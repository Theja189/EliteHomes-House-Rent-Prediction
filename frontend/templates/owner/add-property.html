<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Property | EliteHomes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div class="container py-5">

<h1 class="mb-4 text-center">
Add New Property
</h1>

<form
method="POST"
action="/add-property"
enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">
Property Title
</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
City
</label>

<input
type="text"
name="city"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Rent
</label>

<input
type="number"
name="rent"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
BHK
</label>

<input
type="number"
name="bhk"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Area (sq.ft)
</label>

<input
type="number"
name="area"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Furnishing
</label>

<select
name="furnishing"
class="form-control">

<option>Furnished</option>
<option>Semi-Furnished</option>
<option>Unfurnished</option>

</select>

</div>

<div class="mb-4">

<label class="form-label">
Property Image
</label>

<input
type="file"
name="image"
class="form-control">

</div>

<button
type="submit"
class="btn btn-primary">

<i class="bi bi-building-add"></i>

Save Property

</button>

</form>

</div>

</body>
</html>
